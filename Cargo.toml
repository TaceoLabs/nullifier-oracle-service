[workspace]
members = [
    "ark-babyjubjub",
    "oprf-service",
    "oprf-core",
    "poseidon2",
    "eddsa-babyjubjub",
    "oprf-types",
    "oprf-client",
    "ark-serde-compat"
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.85"
authors = ["TACEO GmbH <hello@taceo.io>"]
homepage = "https://www.taceo.io"
repository = "https:://github.com/TaceoLabs/nullifier-oracle-service"
license = "MIT OR Apache-2.0"
publish = false
readme = "./README.md"

[workspace.dependencies]
ark-bn254 = "0.5.0"
ark-ec = "0.5.0"
ark-ff = "0.5.0"
ark-groth16 = "0.5.0"
ark-r1cs-std = { version = "0.5.0" }
ark-std = "0.5.0"
axum = "0.8.4"
clap = "4.5.46"
eyre = { version = "0.6" }
git-version = "0.3.9"
humantime = "2.2.0"
rand = { version = "0.8" }
rand_chacha = { version = "0.3" }
serde = { version = "1" }
serde_json = { version = "1.0.143" }
rustls = "0.23.31"
thiserror = { version = "1" }
tokio = { version = "1.47" }
tokio-util = "0.7.16"
tower-http = { version = "0.6.6", features = ["set-header", "cors", "trace"] }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3" }
uuid = "1.18.0"

[profile.profiling]
inherits = "bench"
debug = true
lto = "thin"

# This profile can be used for CI in pull requests.
[profile.ci-dev]
inherits = "dev"
opt-level = 1
incremental = false
debug = true
